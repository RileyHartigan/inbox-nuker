<!DOCTYPE html>
<html>
<head>
  <title>Inbox Nuker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      text-align: center;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    button {
      background: red;
      color: white;
      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }
    select, input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Inbox Nuker</h2>
  <p>Delete thousands of emails instantly.</p>

  <input id="license" placeholder="Enter your license key">

  <select id="query">
    <option value="in:anywhere">Delete EVERYTHING</option>
    <option value="category:promotions">Delete Promotions</option>
    <option value="category:social">Delete Social</option>
    <option value="older_than:1y">Delete Older Than 1 Year</option>
    <option value="larger:5M">Delete Large Emails</option>
  </select>

  <button onclick="runDelete()">DELETE EMAILS</button>

  <p id="status"></p>
</div>

<script>
async function runDelete() {
  const license = document.getElementById("license").value;
  const query = document.getElementById("query").value;
  const status = document.getElementById("status");

  if (!license) {
    status.innerText = "Enter a license key.";
    return;
  }

  // Simple license check
  const validKeys = ["ABC123", "TESTKEY", "PREMIUM999"]; // replace with your real keys
  if (!validKeys.includes(license)) {
    status.innerText = "Invalid license key.";
    return;
  }

  status.innerText = "Deleting emails...";

  const url = "YOUR_APPS_SCRIPT_URL_HERE?q=" + encodeURIComponent(query);

  const res = await fetch(url);
  const text = await res.text();

  status.innerText = text;
}
</script>

</body>
</html>
